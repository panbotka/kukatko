name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # goreleaser needs this to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for the changelog

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26" # match go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # frontend build runs in the goreleaser before-hook

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
