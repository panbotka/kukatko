# Kukátko — example configuration.
#
# Copy this file to `config.yaml` (or `config.local.yaml`, which is gitignored)
# and adjust. Every key may be overridden by an environment variable using the
# KUKATKO_ prefix with dots replaced by underscores, e.g.:
#   database.url    -> KUKATKO_DATABASE_URL
#   web.port        -> KUKATKO_WEB_PORT
#   backup.s3.bucket-> KUKATKO_BACKUP_S3_BUCKET
# The environment value always wins over the file value.
#
# Secrets (database URL, session secret, admin password, S3 keys, mapy.com key)
# should come from the environment in production — keep them out of committed
# files. The mapy.com key is the one exception to the prefix rule: it is read
# from the unprefixed MAPY_API_KEY.
#
# The config file is OPTIONAL: with KUKATKO_DATABASE_URL set in the environment,
# kukatko runs on defaults alone.

database:
  # PostgreSQL DSN. REQUIRED (no default). Usually set via KUKATKO_DATABASE_URL.
  url: "postgres://kukatko:password@localhost:5432/kukatko?sslmode=disable"
  # Maximum number of open connections in the pool.
  max_open_conns: 25
  # Maximum number of idle connections (must not exceed max_open_conns).
  max_idle_conns: 5

storage:
  # Where originals live: "fs" (default, local disk) or "r2" (private Cloudflare
  # R2 bucket, for a host whose disk cannot hold the library). Anything else fails
  # startup. KUKATKO_STORAGE_BACKEND.
  backend: "fs"
  # Directory holding original, immutable media files. Only the "fs" backend uses it.
  originals_path: "/var/lib/kukatko/originals"
  # Directory for derived artifacts (thumbnails, video posters, …).
  cache_path: "/var/lib/kukatko/cache"
  # Directory the "r2" backend stages uploads through and materializes objects into
  # for the tools that need a real file (exiftool, ffprobe, ffmpeg, heif-convert,
  # vipsthumbnail). It needs room for the largest single file, not for the library.
  # KUKATKO_STORAGE_TEMP_PATH.
  temp_path: "/var/lib/kukatko/tmp"

  # Cloudflare R2. Read only when backend is "r2"; then every key below except
  # url_signing_secret_previous is REQUIRED, and a missing one fails startup with a
  # message naming it. Keep credentials out of this file — set them via the
  # environment.
  r2:
    # S3 API endpoint: https://<accountid>.r2.cloudflarestorage.com.
    # KUKATKO_STORAGE_R2_ENDPOINT.
    endpoint: ""
    # Bucket region. R2 accepts only "auto". KUKATKO_STORAGE_R2_REGION.
    region: "auto"
    # Bucket holding originals and thumbnails. Keep it PRIVATE: objects are served
    # by an edge Worker that checks the URL signature. KUKATKO_STORAGE_R2_BUCKET.
    bucket: ""
    # Credentials of an R2 API token. KUKATKO_STORAGE_R2_ACCESS_KEY / _SECRET_KEY.
    access_key: ""
    secret_key: ""
    # Domain of the edge Worker serving the objects — https://kukatko-media.panbotka.cz.
    # Signed URLs are minted under it and handed straight to the browser. The Worker
    # is NOT built here: it, the bucket and this hostname are defined in the infra
    # repo (cloudflare-r2/) and deployed by Terraform.
    # KUKATKO_STORAGE_R2_MEDIA_BASE_URL.
    media_base_url: ""
    # Shared with the Worker; signs "<object-key>\n<expiry>" with HMAC-SHA256. The
    # very same value must be set as the Worker's secret_text binding in the infra
    # repo (cloudflare-r2/) — Kukátko mints, the Worker verifies, and the contract
    # they are both tested against is internal/storage/testdata/url_signature_vectors.json.
    # url_signing_secret_previous is still ACCEPTED on verification, so the secret
    # rotates without a window of broken URLs: move the old value there, put the new
    # one in url_signing_secret, deploy both sides, and drop the old one only once
    # every outstanding URL has expired (url_ttl, one hour by default). Full
    # procedure in docs/OPERATIONS.md.
    # KUKATKO_STORAGE_R2_URL_SIGNING_SECRET / _URL_SIGNING_SECRET_PREVIOUS.
    url_signing_secret: ""
    url_signing_secret_previous: ""
    # How long a signed URL stays valid. Short on purpose: a leaked URL is useful for
    # at most this long, and every API response carries freshly signed URLs. Must be
    # positive. KUKATKO_STORAGE_R2_URL_TTL.
    url_ttl: "1h"

thumb:
  # Thumbnail rendering engine: "go" (default, pure-Go decode+resize, CGO-free)
  # or "vips" (shell out to vipsthumbnail for JPEG/PNG/WebP — markedly faster and
  # far lower-memory on large images). The vips engine falls back to the pure-Go
  # engine per photo for any other source (HEIC/RAW/video) or if a vips call
  # fails, so it never changes output — only speed. Requires the vipsthumbnail
  # binary (Debian/Ubuntu: apt install libvips-tools). KUKATKO_THUMB_ENGINE.
  engine: "go"
  # vipsthumbnail executable resolved on PATH (only used when engine is "vips").
  vips_binary: "vipsthumbnail"
  # Max thumbnail sizes encoded in parallel per photo. 0 = GOMAXPROCS. Lower it on
  # memory-constrained hosts to cap peak thumbnail memory. KUKATKO_THUMB_CONCURRENCY.
  concurrency: 0

web:
  # Listen host. Use 0.0.0.0 to bind all interfaces.
  host: "0.0.0.0"
  # Listen TCP port (1–65535).
  port: 8080
  # Secret used to sign session cookies. Set via KUKATKO_WEB_SESSION_SECRET.
  session_secret: ""
  # CORS allowed origins. As an env var, comma-separated:
  #   KUKATKO_WEB_ALLOWED_ORIGINS="https://a.example,https://b.example"
  allowed_origins: []
  # Mark session cookies as Secure (HTTPS-only). Keep false for plain-HTTP local
  # development; enable when running behind a TLS-terminating reverse proxy.
  secure_cookies: false

embedding:
  # URL of the external embedding service (runs on the box; may be offline).
  url: "http://localhost:8000"
  # Dimensionality of image embeddings produced by the service.
  image_dim: 768
  # Dimensionality of face embeddings produced by the service.
  face_dim: 512
  # Optional Wake-on-LAN auto-wake of the embeddings box. When enabled, the
  # server sends a magic packet on the local LAN whenever image_embed/face_detect
  # jobs are waiting above min_queue AND the sidecar health check reports offline.
  # Wake-on-LAN does NOT traverse Tailscale (no L2 broadcast) — the host must
  # share the physical LAN with the box. Default OFF; manual power-on stays fine.
  wake:
    # Turn auto-wake on. When false the feature is fully inert (no polling/packets).
    enabled: false
    # The box NIC's hardware address (the magic-packet target). Required when enabled.
    mac: ""
    # UDP broadcast destination for the magic packet (used when interface is empty).
    broadcast_addr: "255.255.255.255:9"
    # Local NIC name to emit a raw Ethernet magic frame on (e.g. "eth0"); needs
    # CAP_NET_RAW. Empty selects the UDP broadcast path above instead.
    interface: ""
    # Minimum pending image_embed/face_detect jobs before a wake is attempted.
    min_queue: 1
    # Minimum delay between successive magic packets, so a sleeping box is not spammed.
    cooldown: 5m

faces:
  # Minimum detector confidence (det_score) a detected face must have to be
  # stored; lower-confidence detections are dropped by the face_detect job. The
  # sidecar applies its own detection threshold, so this is a second floor. Set
  # to 0 (or below) to store every detection.
  min_det_score: 0.5
  # Minimum Intersection-over-Union a detected face must share with an existing
  # marker for the two to be treated as the same region (face↔marker matching).
  iou_threshold: 0.1
  # Maximum number of likely subjects suggested for an unnamed face.
  suggestion_limit: 5
  # Cosine-distance cutoff for the primary suggestion search; neighbouring faces
  # farther than this are ignored before the threshold fallback widens the search.
  # Set to 0 (or below) to disable the primary cutoff.
  suggestion_max_distance: 0.5
  # Minimum normalised width (0..1) a neighbouring face must have to contribute a
  # suggestion, so tiny background faces do not drive identity guesses. Set to 0
  # (or below) to disable the size filter.
  min_face_size: 0.02

cluster:
  # Face auto-clustering: groups unassigned faces of the same person so a whole
  # group can be named in one action (POST /api/v1/process/clusters rebuilds the
  # clusters; the clusters are exposed under /api/v1/faces/clusters).
  #
  # Maximum cosine distance between two faces for them to be linked as the same
  # person. Lower is stricter (fewer, purer clusters); higher is looser. Set to 0
  # (or below) to fall back to the default.
  threshold: 0.4
  # Smallest connected component that becomes a cluster; smaller groups stay
  # unclustered so single stray faces are not surfaced. Set to 0 (or below) to
  # fall back to the default.
  min_size: 2
  # Cosine-distance cutoff for suggesting an existing subject for a cluster: named
  # neighbours farther than this from the cluster's centroid produce no
  # suggestion. Set to 0 (or below) to fall back to the default.
  suggestion_max_distance: 0.5

candidates:
  # "Find a person among untagged photos": for a named subject, search the
  # unassigned faces that resemble the subject's own tagged faces
  # (POST /api/v1/subjects/{uid}/candidates). Purely a search — confirming a
  # candidate goes through the normal POST /photos/{uid}/faces/assign path.
  #
  # Default maximum cosine distance a candidate face may sit from an exemplar. A
  # request may send its own threshold; this is the fallback and the baseline the
  # vote rule scales against. Set to 0 (or below) to fall back to the default.
  max_distance: 0.5
  # How many nearest unassigned faces each exemplar's kNN returns before voting
  # merges them. Bounds the per-exemplar fan-out. Set to 0 (or below) to fall back
  # to the default.
  search_limit: 1000
  # Minimum face width in display pixels for a candidate to be reviewable — a
  # 20-pixel face in a crowd cannot be judged. Complements the relative floor
  # reused from faces.min_face_size. Set to 0 (or below) to disable the pixel floor.
  min_face_px: 32
  # How many exemplar kNN searches run at once, so searching a person with hundreds
  # of tagged photos does not fan out unboundedly. Set to 0 (or below) to fall back
  # to the default.
  concurrency: 8

sweep:
  # Recognition sweep: scan every named person for confident matches among unnamed
  # faces at once, grouped by person (GET /api/v1/faces/sweep, editor-only). It
  # composes the candidates search above; it never auto-assigns — confidence only
  # narrows the list, every confirm still needs a human.
  #
  # How many subjects are scanned at once. This stacks on candidates.concurrency
  # (per-subject exemplar searches), so keep it small on a RAM-constrained box. Set
  # to 0 (or below) to fall back to the default.
  concurrency: 4
  # Cap on how many subjects one sweep scans. When more subjects have faces than
  # this, the sweep scans the first max_subjects (by name) and marks the result
  # capped rather than silently truncating. Set to 0 (or below) for the default.
  max_subjects: 500

expand:
  # "Expand a collection": for an album or a label, find the photos most like its
  # members that are not in it yet, so a half-tagged library can be finished
  # (GET /api/v1/albums/{uid}/similar and /labels/{uid}/similar, editor-only). It
  # votes each member's embedding neighbours together — not a mean-of-the-collection
  # vector — and never writes: adding the found photos goes through POST /photos/bulk.
  #
  # Default maximum cosine distance a candidate may sit from a source photo, shown in
  # the UI as 1 - distance (0.30 → 70 % similarity). A request may send its own
  # threshold; this is the fallback and the baseline the vote rule scales against.
  # Set to 0 (or below) to fall back to the default.
  max_distance: 0.30
  # Default number of candidates returned when a request omits ?limit. Set to 0 (or
  # below) to fall back to the default.
  limit: 50
  # Cap on a request's own ?limit, so one call cannot ask for an unbounded
  # neighbourhood. Set to 0 (or below) to fall back to the default.
  max_limit: 200
  # How many nearest photos each source photo's kNN returns before voting merges
  # them. Over-fetches so the later filters do not starve. Set to 0 (or below) to
  # fall back to the default.
  search_limit: 200
  # Cap on how many member photos are used as query vectors. A larger album is
  # sampled deterministically (spread across its members) and the truncation reported
  # rather than running thousands of kNN queries. Set to 0 (or below) for the default.
  source_cap: 500
  # How many per-source kNN searches run at once. Set to 0 (or below) to fall back to
  # the default.
  concurrency: 8

review:
  # The review game (GET /api/v1/review/queue + POST /api/v1/review/answer,
  # editor-only): one question at a time — "is this face person X?", "should this
  # photo carry label Y?" — picked from the uncertainty band where a human answer
  # teaches the system the most. Confidence is 1 - cosine distance; only candidates
  # with band_min <= confidence < band_max become questions. Below the band the
  # guess is noise; at or above band_max the /recognition and /expand pages confirm
  # in bulk instead. Out-of-range values fall back to the default band.
  band_min: 0.45
  band_max: 0.75
  # Default number of questions per queue batch (the UI prefetches to stay instant
  # between answers). Set to 0 (or below) to fall back to the default.
  queue_size: 20
  # How long a built queue is served from the per-user cache before the expensive
  # candidate searches run again. Answers update the cached queue in place, so the
  # session counter stays cheap. Set to 0 (or below) to fall back to the default.
  cache_ttl: 60s
  # At most this many labels are scanned per queue rebuild. Set to 0 (or below) to
  # fall back to the default.
  max_labels: 200
  # How many label-similarity searches run at once during a rebuild (each already
  # fans out internally; keep low on a RAM-constrained box). Set to 0 (or below) to
  # fall back to the default.
  label_concurrency: 2

auth:
  # Credentials used to create the initial admin account on first run.
  bootstrap_admin_username: ""
  # Set via KUKATKO_AUTH_BOOTSTRAP_ADMIN_PASSWORD; do not commit a real value.
  bootstrap_admin_password: ""
  # Sliding idle window: every authenticated request extends the session to
  # now+session_ttl (an active user is never logged out). Go duration string.
  session_ttl: "168h"
  # Absolute cap on a session's age regardless of activity (sliding extension
  # never pushes expiry past created_at+session_max_lifetime). Must be >= ttl.
  session_max_lifetime: "720h"
  # Max failed login attempts per username+IP within login_rate_window before
  # further attempts are rejected with HTTP 429 (brute-force protection).
  login_rate_limit: 10
  login_rate_window: "15m"

maps:
  # mapy.com API key. Kept server-side (proxied). Read from MAPY_API_KEY.
  mapy_api_key: ""
  # Exact User-Agent sent on every mapy.com request (tiles + geocode). A mapy.com
  # key can be restricted to one exact User-Agent instead of a source IP, which
  # makes this string a SECOND SECRET: keep it out of the repo and out of logs,
  # set it via KUKATKO_MAPS_USER_AGENT. Empty (the default) sends no explicit
  # header, i.e. Go's own User-Agent.
  user_agent: "" # e.g. "Kukatko/1.0 (<random-token>)"
  # Base URL of the mapy.com REST API the tile/reverse-geocode proxies call.
  # Override only to target a different endpoint (e.g. a test double).
  base_url: "https://api.mapy.com"
  # Reverse-geocode throttle for the background `places` job (which caches each
  # geotagged photo's location). Protects the mapy.com monthly credit budget;
  # processing slowly is fine. geocode_rate_per_sec <= 0 disables the throttle.
  geocode_rate_per_sec: 5
  geocode_burst: 10
  # Server-side cache of proxied tiles. The free tier bills ONE CREDIT PER TILE
  # (250k/month), so without it every pan over an already-seen area costs again.
  # Only successful tiles are cached, never an error. Bounded by bytes (LRU
  # eviction) and by age; <= 0 on either disables the cache entirely.
  tile_cache_bytes: 67108864 # 64 MiB ≈ a few thousand tiles
  tile_cache_ttl: 24h

# Backup destination: a SECOND, INDEPENDENT bucket. It shares nothing with
# storage.r2.* — its own endpoint, region, bucket and credentials — so it can
# live in another account or with another provider. Do not assume both are R2.
#
# There is no object versioning to fall back on, so this bucket is the ONLY
# protection against an accidental or malicious delete. See docs/RESTORE.md.
#
# Where originals are read from follows storage.backend:
#   fs → walked from storage.originals_path and streamed up.
#   r2 → listed in storage.r2.bucket and copied across SERVER-SIDE, so the
#        payload never passes through this process. That copy is issued against
#        s3.endpoint below with storage.r2.bucket named as the source, so these
#        credentials must be able to READ the primary bucket.
# Pointing this at storage.r2.bucket itself is a fatal misconfiguration.
#
# The same s3.* settings are reused by `kukatko restore` (list dumps, restore
# the database, download originals) — see docs/RESTORE.md.
backup:
  s3:
    # S3-compatible endpoint (AWS / MinIO / Backblaze / Wasabi / R2).
    endpoint: ""
    region: ""
    bucket: ""
    # Set access_key / secret_key via the environment, not this file.
    access_key: ""
    secret_key: ""
    # Use path-style addressing (required by most MinIO setups).
    path_style: false
  # Cron-style backup schedule (standard 5-field cron or @daily/@hourly/@every
  # descriptors). Empty disables scheduled backups (manual `kukatko backup` and
  # the admin trigger still work).
  schedule: ""
  # How many of the most recent database dumps to keep in the bucket; older
  # dumps are pruned after a successful run. 0 or below keeps every dump.
  # Originals are NEVER pruned: with no versioning underneath, a deleted
  # original is a lost photo.
  retention: 7

trash:
  # Days a soft-deleted item is retained before permanent deletion. Default is
  # 365 (one year); a value <= 0 disables the scheduled retention purge (manual
  # purge, empty-trash and the admin purge-older endpoint still work).
  retention_days: 365

duplicate:
  # Enable duplicate detection.
  enabled: true
  # Maximum perceptual-hash Hamming distance to flag an upload as a possible
  # near-duplicate of an existing photo (a non-blocking warning on the result).
  phash_max_diff: 8
  # Maximum embedding cosine distance to treat images as duplicates.
  embedding_max_dist: 0.05

# Stacks: group the several files of one shot (RAW+JPEG, exported edits, an
# iPhone Live Photo's still+clip) into one library item with a visible primary
# and the rest hidden as variants. Detection runs via POST /api/v1/process/stacks.
stacks:
  # Master switch for the whole feature (automatic detection and manual stacking).
  enabled: true
  # Each detection rule is switched independently: they have very different
  # false-positive rates. Rules only ever stack photos that plausibly ARE the same
  # shot — a wrongly stacked photo is hidden, and an invisible photo is a lost one.
  rules:
    # Same base filename, different extension (IMG_1234.CR2 + IMG_1234.jpg). Safest.
    base_name: true
    # Copy / sequence / edit names (IMG_1234 (2).jpg, IMG_1234 copy.jpg,
    # IMG_1234-edited.jpg) collapsed onto their original.
    sequential_copy: true
    # Same EXIF ImageUniqueID / XMP InstanceID. Very reliable where it exists.
    unique_id: true
    # Same capture second AND same GPS. The loosest rule: it wrongly stacks burst
    # shots taken within one second, so it is OFF by default.
    time_gps: false

# MCP server — expose the library to an AI agent (Model Context Protocol), so it
# can search, read and organise it directly: "find every photo of grandma from the
# sixties and put them in an album" is how this library is actually maintained.
#
# It is mounted at POST /api/v1/mcp on this same HTTP server, behind the SAME auth
# and the SAME RBAC as every other route: an agent authenticates with a long-lived
# API token (Authorization: Bearer kkt_...), and the role of the token's owner
# Metadata sidecars: a YAML file per photo, written next to the originals in
# storage, holding everything a human created or a machine derived about it —
# title, description, who is in the photo (with the face box), which albums and
# labels it carries, per-user favourites and ratings, the non-destructive edit.
#
# It exists so this library survives losing the database. Everything above
# otherwise lives in exactly one place: Postgres. There is an S3 backup, and that
# is good, but it is a single mechanism — and a backup that has been quietly
# failing for three months is discovered on the day you need it. A sidecar is a
# second mechanism of a different kind: the curation lives next to the photo it
# describes, in a plain-text file any tool can read, on the same storage as the
# original.
#
# Sidecars live in a parallel tree under the "sidecars/" prefix of the storage
# root: the original 2024/05/IMG_1234.jpg has its sidecar at
# sidecars/2024/05/IMG_1234.jpg.yml. The originals tree stays purely media, and
# the sidecars still travel with the originals into the S3 backup.
#
# Written by the `sidecar` job, enqueued whenever a photo's metadata or curation
# changes. Backfill the whole library with `kukatko sidecar backfill` or the
# admin-only POST /api/v1/process/sidecars. Deliberately NOT written: the image
# embedding and the face vectors — large, binary, and cheap to recompute from the
# original, which is what the embedding/face backfills are for.
#
# The format, in full: docs/RESTORE.md.
sidecar:
  # Master switch, ON by default: a disaster-recovery mechanism nobody switched on
  # is not one, so it defaults to running before the day it is needed. false = no
  # sidecar is written or deleted, no sidecar job is enqueued, and
  # /process/sidecars answers 503. Sidecars already in storage are left exactly as
  # they are — turning the export off is not a request to destroy what it already
  # wrote, and a stale sidecar is worth more than no sidecar.
  #
  # Turn it off if the I/O is not worth it to you: it is one small write per photo
  # per edit, against a store that may charge per request.
  # KUKATKO_SIDECAR_ENABLED.
  enabled: true

# decides what it may do. A viewer token can read and is refused every write; the
# "ai" role exists for exactly this kind of automation (write + import, no admin).
#
# Nothing destructive is exposed — no delete, no purge, no empty-trash, no archive,
# no restore, no backup, no user administration. That is deliberate and permanent.
# Every change an agent makes writes an audit row in the mutation's transaction.
#
# Minting a token for an agent, and the full tool list: docs/MCP.md.
mcp:
  # Master switch, OFF by default: this endpoint hands an AI agent the library, so
  # it is opt-in. false = the route is not mounted at all, so /api/v1/mcp does not
  # exist rather than existing and answering 403 (a 403 would still tell an
  # attacker the endpoint is there). Mind that an unmounted path then falls through
  # to the frontend's catch-all like any unknown URL, so curl sees index.html
  # rather than a 404; an MCP client gets HTML and fails. KUKATKO_MCP_ENABLED.
  enabled: false
  # Default number of rows a list tool returns when the agent does not say. Small
  # on purpose: an agent's context window, not the database, is the scarce resource
  # here. Set to 0 (or below) to fall back to the default. KUKATKO_MCP_PAGE_SIZE.
  page_size: 25
  # Hard cap on a tool's limit argument. A larger request is trimmed to this rather
  # than refused. Set to 0 (or below) to fall back to the default.
  # KUKATKO_MCP_MAX_PAGE_SIZE.
  max_page_size: 100

# Estimating a missing location from photos taken near it in time. A photo with a
# known date but no GPS was very often taken the same day, in the same place, as
# photos that do have coordinates; reusing their location fills the map and makes
# the places hierarchy useful. Estimates are stored marked (location_source =
# "estimate"), shown as estimates in the UI, and the user can accept or clear each
# one. Only run by the admin-only POST /process/locations backfill; nothing is
# estimated on upload (a fresh photo has no same-day neighbours yet).
location_estimate:
  # Master switch. false = no coordinate is ever inferred and /process/locations
  # answers 503. Already-estimated locations are left alone, marked, for the user
  # to accept or clear. KUKATKO_LOCATION_ESTIMATE_ENABLED.
  enabled: true
  # Half-width of the neighbour window: a photo is estimated from photos taken
  # within ±window of it. The same calendar day is the obvious choice, a few hours
  # is a better one — a day that starts in Brno and ends in Vienna is exactly where
  # a same-day estimate goes wrong. KUKATKO_LOCATION_ESTIMATE_WINDOW.
  window: 6h
  # Coherence radius: the neighbours are only trusted if EVERY one of them lies
  # within this distance (metres) of their centroid; otherwise the photo is left
  # with no location at all. A wrong location is worse than none — it silently
  # poisons the map, the places hierarchy and every near: search built on them —
  # so widening this past the size of one outing is a bad trade.
  # KUKATKO_LOCATION_ESTIMATE_RADIUS_METERS.
  radius_meters: 5000

# Upload / ingest limits.
upload:
  # Maximum size of a single uploaded file, in mebibytes. 0 disables the cap
  # (uploads are streamed to disk and never buffered whole in memory regardless).
  max_file_size_mb: 0

# Video playback/streaming. Videos are always served with HTTP range support so
# browsers can seek without downloading the whole file.
video:
  # Transcode non-web-friendly codecs (e.g. HEVC/H.265) to H.264/MP4 on the fly
  # via ffmpeg so they play in the browser. OFF by default: transcoding is
  # CPU-intensive, runs on every playback (no caching) and the transcoded stream
  # cannot be seeked precisely. When off, such a video is streamed as-is and the
  # client offers a download link when the browser cannot decode it.
  transcode: false

# Background worker that drains the persistent job queue inside `kukatko serve`.
worker:
  # Number of jobs processed in parallel. 0 uses the built-in default.
  count: 2
  # How long an idle worker waits before polling the queue again when empty.
  poll_interval: 2s
  # Lock age past which a running job is presumed abandoned (its worker died)
  # and recovered for retry by the queue.
  stale_after: 5m
  # How often stale-lock recovery runs.
  stale_scan_interval: 1m

# Bulk metadata editing endpoint (POST /api/v1/photos/bulk).
bulk:
  # Maximum number of photo UIDs a single bulk request may target. Requests that
  # exceed it are rejected with HTTP 413 before any change is made. 0 falls back
  # to the built-in default (1000).
  max_batch_size: 1000

# Read-only import sources. PhotoPrism stays the primary catalog during the
# migration; its import is incremental (high-watermark on UpdatedAt) and
# repeatable.
import:
  photoprism:
    # Root URL of the running PhotoPrism instance. Empty disables the import.
    base_url: ""
    # Long-lived app password / access token, sent as Authorization: Bearer on
    # every request (PhotoPrism: `photoprism auth add -n Kukatko -s "photos albums"`).
    # Set via KUKATKO_IMPORT_PHOTOPRISM_TOKEN; do not commit a real value.
    token: ""
    # Photo listing page size; the client clamps it to PhotoPrism's cap (1000).
    page_size: 1000
  photosorter:
    # Read-only PostgreSQL DSN of the photo-sorter database to migrate from.
    # Empty disables the `kukatko migrate photosorter` command and the
    # POST /api/v1/import/photosorter trigger. Set via
    # KUKATKO_IMPORT_PHOTOSORTER_DSN; do not commit a real value.
    dsn: ""
    # Photo listing page size for the migration.
    page_size: 500

# Structured logging. Logs are emitted as JSON on stderr with a secret-redacting
# hook (values whose key names a password/token/api_key/secret/cookie/dsn are
# replaced with "[REDACTED]"). Override the level with KUKATKO_LOG_LEVEL.
log:
  # Minimum level emitted: debug, info, warn, or error. Empty defaults to info;
  # an invalid value fails startup.
  level: info

# Prometheus metrics. When enabled, `kukatko serve` mounts GET /metrics
# (unauthenticated) and instruments HTTP requests, the job queue/worker, the
# embeddings sidecar, imports, thumbnail generation, and the DB pool. /metrics is
# not authenticated — restrict it at the network layer (bind/firewall) when the
# server is exposed publicly. Override with KUKATKO_METRICS_ENABLED.
metrics:
  # Mount /metrics and install the request-metrics middleware.
  enabled: true

# Per-client-IP rate limits on resource-intensive endpoints. Each rule is an
# independent token bucket keyed by the caller's IP (taken from
# X-Forwarded-For/X-Real-IP behind a trusted proxy): rate_per_sec tokens
# replenish per second up to burst, and a request with an empty bucket gets HTTP
# 429 with a Retry-After header. The defaults are generous enough for normal
# human/UI use and only bite under flooding. Set a rule's rate_per_sec to 0 to
# disable it. Login throttling lives under auth.login_rate_*; the geocode proxy
# keeps its own credit-protecting limiter under maps.*. Override individual keys
# with e.g. KUKATKO_RATELIMIT_UPLOAD_RATE_PER_SEC.
ratelimit:
  upload: # POST /upload (multipart ingest)
    rate_per_sec: 5
    burst: 30
  bulk: # POST /photos/bulk (batch metadata edits)
    rate_per_sec: 2
    burst: 10
  import: # POST /import/photoprism and /import/photosorter triggers
    rate_per_sec: 1
    burst: 3
  tiles: # GET /map/tiles/... (mapy.com tile proxy)
    rate_per_sec: 50
    burst: 200
